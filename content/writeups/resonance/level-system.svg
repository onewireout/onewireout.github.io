<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6fc3b2"/>
    </marker>
    <marker id="gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8fa3"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#6fc3b2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6fc3b2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="760" height="540" rx="10" fill="#15151d"/>
  <rect x="140" y="40" width="480" height="380" fill="url(#glow)"/>

  <!-- ══ second floor (top plane) ══ -->
  <g transform="matrix(1 -0.28 0.55 0.28 190 150)">
    <rect x="0" y="0" width="300" height="150" rx="6" fill="#1e1e2a" stroke="#3a3a4a" stroke-width="1.2"/>
    <rect x="30" y="30" width="240" height="90" rx="4" fill="none" stroke="#6fc3b2" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  </g>
  <text x="128" y="118" font-size="13" fill="#d5d9e4" text-anchor="end" font-weight="600">second</text>
  <text x="128" y="134" font-size="10.5" fill="#8a8fa3" text-anchor="end">inset 90 px &#183; open</text>

  <!-- ══ first floor ══ -->
  <g transform="matrix(1 -0.28 0.55 0.28 190 265)">
    <rect x="0" y="0" width="300" height="150" rx="6" fill="#1e1e2a" stroke="#3a3a4a" stroke-width="1.2"/>
    <rect x="20" y="20" width="260" height="110" rx="4" fill="none" stroke="#6fc3b2" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <!-- promoted window -->
    <rect x="95" y="45" width="130" height="75" rx="4" fill="#1c2623" stroke="#6fc3b2" stroke-width="1.4"/>
  </g>
  <text x="128" y="233" font-size="13" fill="#d5d9e4" text-anchor="end" font-weight="600">first</text>
  <text x="128" y="249" font-size="10.5" fill="#8a8fa3" text-anchor="end">inset 60 px</text>

  <!-- ══ ground floor ══ -->
  <g transform="matrix(1 -0.28 0.55 0.28 190 380)">
    <rect x="0" y="0" width="300" height="150" rx="6" fill="#1e1e2a" stroke="#3a3a4a" stroke-width="1.2"/>
    <rect x="10" y="10" width="280" height="130" rx="4" fill="none" stroke="#6fc3b2" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <!-- resident windows -->
    <rect x="30" y="30" width="115" height="70" rx="4" fill="#252534" stroke="#8a8fa3" stroke-width="1.1"/>
    <rect x="160" y="65" width="115" height="65" rx="4" fill="#252534" stroke="#8a8fa3" stroke-width="1.1"/>
    <!-- ghost: where the new window would have landed -->
    <rect x="95" y="45" width="130" height="75" rx="4" fill="none" stroke="#6fc3b2" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.55"/>
  </g>
  <text x="128" y="348" font-size="13" fill="#d5d9e4" text-anchor="end" font-weight="600">ground</text>
  <text x="128" y="364" font-size="10.5" fill="#8a8fa3" text-anchor="end">inset 30 px &#183; default</text>

  <!-- ══ basement ══ -->
  <g transform="matrix(1 -0.28 0.55 0.28 190 470)">
    <rect x="0" y="0" width="300" height="150" rx="6" fill="#1a1a24" stroke="#3a3a4a" stroke-width="1.2" stroke-dasharray="6 5"/>
  </g>
  <text x="128" y="438" font-size="13" fill="#8a8fa3" text-anchor="end" font-weight="600">basement</text>
  <text x="128" y="454" font-size="10.5" fill="#8a8fa3" text-anchor="end">manual layer</text>

  <!-- ══ promotion arrow: ghost on ground → window on first ══ -->
  <line x1="362" y1="358" x2="362" y2="272" stroke="#6fc3b2" stroke-width="1.6" marker-end="url(#teal)"/>
  <text x="374" y="312" font-size="10.5" fill="#6fc3b2">demoted on overlap</text>

  <!-- ══ demotion arrow ══ -->
  <line x1="580" y1="262" x2="580" y2="348" stroke="#8a8fa3" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#gray)"/>
  <text x="592" y="308" font-size="10.5" fill="#8a8fa3">promoted when clear</text>

  <!-- ══ z-order note ══ -->
  <polyline points="680,415 710,415 710,105 680,105" fill="none" stroke="#3a3a4a" stroke-width="1.1"/>
  <text x="728" y="255" font-size="10.5" fill="#8a8fa3" text-anchor="middle" transform="rotate(90 728 255)">z-order from tree order</text>
</svg>
